name: mana
description: "수양회 참가자 등록 시스템"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 구글 로그인 (ID 토큰 → 자체 JWT 교환)
  google_sign_in: ^6.2.2

  # 토큰 저장 (JWT)
  flutter_secure_storage: ^9.2.4

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 라우팅
  go_router: ^15.1.1

  # UI 유틸
  cupertino_icons: ^1.0.8

  # 다국어
  intl: ^0.20.2

  # 이미지 선택 (영수증 업로드)
  image_picker: ^1.1.2

  # 파일 공유 (CSV/Excel 내보내기)
  share_plus: ^10.1.4

  # Excel 생성
  excel: ^4.0.6

  # CSV 생성
  csv: ^6.0.0

  # HTTP 클라이언트 (항공편 API)
  http: ^1.3.0

  # 로컬 저장소 (UUID 캐시)
  shared_preferences: ^2.5.2

  # 날짜/시간 선택
  table_calendar: ^3.2.0

  # Firebase (Push 알림)
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.3

  # GPS 위치 (SOS)
  geolocator: ^13.0.2

  # 디바이스 타임존 감지 (일정 생성 시 자동 설정)
  flutter_timezone: ^3.0.0

  # 카카오 로그인
  kakao_flutter_sdk_user: ^1.9.1

  # 경로 유틸
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  generate: true  # 다국어 자동 생성

  assets:
    - assets/images/
    - assets/ubf_chapters.json
